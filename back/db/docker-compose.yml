services: 
  db:
    container_name: CineCheck_Pg
    image: postgres:16
    restart: always
    environment: 
      POSTGRES_PASSWORD: admin 
      POSTGRES_USER: admin
      POSTGRES_DB: cinecheck
    ports:
      - 5432:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
volumes:
  pg_data: